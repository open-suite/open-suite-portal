name: Publish images

# Build the portal frontend + backend images and push them to GHCR so the
# cluster pulls pre-built images instead of building on the server.
# Tags: branch name, short SHA, and the git tag on release.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: portal-frontend
            context: ./frontend
            target: prod
          - image: portal-api
            context: ./backend
            target: ''
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/open-suite/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
